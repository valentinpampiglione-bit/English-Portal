<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Progress Portal</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- PapaParse for CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="masthead">
      <p class="eyebrow">English classes</p>
      <h1>Progress passport</h1>
      <p class="subtitle">Your progress, tasks and materials, all in one place.</p>
    </header>

    <div class="selector-row">
      <label for="student-select">Student</label>
      <select id="student-select"></select>
    </div>
    
    <div id="status" class="status"></div>

    <main id="portal" class="hidden">
      <!-- Passport Card -->
      <div class="passport-card">
        <div class="stamp">
          <svg class="stamp-ring" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="46" />
            <path id="stamp-circle-path" d="M 50, 50 m -42, 0 a 42,42 0 1,1 84,0 a 42,42 0 1,1 -84,0" />
            <text class="stamp-ring-text">
              <textPath href="#stamp-circle-path" startOffset="0%">ENGLISH CLASSES • ENGLISH CLASSES •</textPath>
            </text>
          </svg>
          <span class="stamp-level" id="stamp-level">—</span>
        </div>
        <div class="passport-info">
          <h2 class="passport-name" id="student-name">Student</h2>
          <p class="passport-level-label" id="student-level-label">Level —</p>
        </div>
      </div>

      <!-- Vocabulary -->
      <section class="block">
        <h2>Vocabulary</h2>
        <div id="vocab-folders" class="vocab-folders"></div>
      </section>

      <!-- Tasks -->
      <section class="block">
        <h2>Tasks</h2>
        <div id="tasks-list" class="tasks"></div>
      </section>

      <!-- Materials -->
      <section class="block">
        <h2>Materials</h2>
        <div id="materials-list" class="materials"></div>
      </section>
    </main>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">×</button>
    <figure class="lightbox-figure">
      <div id="lightbox-img-wrap" class="lightbox-img-wrap">
        <img id="lightbox-img" class="lightbox-img" src="" alt="" />
      </div>
      <div class="lightbox-zoom-controls">
        <button id="zoom-out" class="lightbox-zoom-btn" aria-label="Zoom out">−</button>
        <span id="zoom-level" class="lightbox-zoom-level">100%</span>
        <button id="zoom-in" class="lightbox-zoom-btn" aria-label="Zoom in">+</button>
        <button id="zoom-reset" class="lightbox-zoom-btn" aria-label="Reset zoom">↺</button>
      </div>
      <button id="lightbox-prev" class="lightbox-nav" aria-label="Previous">‹</button>
      <button id="lightbox-next" class="lightbox-nav" aria-label="Next">›</button>
      <figcaption id="lightbox-caption" class="lightbox-caption"></figcaption>
    </figure>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
