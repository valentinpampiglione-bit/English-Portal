<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="style.css">
    <!-- PapaParse is required for your script.js to read the CSVs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <div id="status"></div>
    
    <div id="portal" class="hidden">
        <h1 id="student-name"></h1>
        <p id="student-level-label"></p>
        
        <select id="student-select"></select>
        
        <div id="stamp-level"></div>
        
        <section>
            <h2>Vocabulary</h2>
            <div id="vocab-folders"></div>
        </section>
        
        <section>
            <h2>Tasks</h2>
            <div id="tasks-list"></div>
        </section>
        
        <section>
            <h2>Materials</h2>
            <div id="materials-list"></div>
        </section>
    </div>
    
    <!-- Lightbox -->
    <div id="lightbox" class="hidden">
        <button id="lightbox-close" class="lightbox-nav">×</button>
        <button id="lightbox-prev" class="lightbox-nav">‹</button>
        <button id="lightbox-next" class="lightbox-nav">›</button>
        
        <div id="lightbox-img-wrap">
            <img id="lightbox-img" src="" alt="">
        </div>
        
        <div id="lightbox-caption"></div>
        
        <div class="lightbox-zoom-controls">
            <button id="zoom-out" class="lightbox-zoom-btn">−</button>
            <span id="zoom-level" class="lightbox-zoom-level">100%</span>
            <button id="zoom-in" class="lightbox-zoom-btn">+</button>
            <button id="zoom-reset" class="lightbox-zoom-btn">⟲</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
